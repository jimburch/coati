# /pr — Open a pull request with a crafted body.

description = "Create a pull request for the current branch using `gh` with a thoughtfully synthesized body."

[arguments]
base = { required = false, description = "Base branch (default: main)" }

[prompt]
template = """
Create a pull request against {{args.base | default: 'main'}}.

## Steps

1. Run in parallel:
   - `git status` — clean tree required
   - `git log {{args.base | default: 'main'}}..HEAD --oneline`
   - `git diff {{args.base | default: 'main'}}...HEAD --stat`
   - `gh pr view 2>/dev/null` — check for existing PR
2. If a PR exists, print URL and stop.
3. If tree is dirty, stop and report.
4. Push if needed: `git push -u origin HEAD`.
5. Synthesize:
   - Title: Conventional Commits, ≤ 70 chars
   - Summary: 2–3 sentences on WHY (not a commit list)
   - Changes: 3–5 bullets on notable changes
   - Test plan: checklist the user can tick off
   - Linked issue: scan commits/branch for `#NNN`
6. Show the user the draft and wait for approval.
7. On approval:
   `gh pr create --base {{args.base | default: 'main'}} --title <title> --body <body>`
   Use a HEREDOC for the body.
8. Print the PR URL.

## Rules

- Never `--force` push without explicit request
- Never open a draft PR without explicit request
- Don't copy commit messages verbatim — synthesize
- No "Generated by Gemini" trailer
"""

[shell.allow]
patterns = ["git *", "gh *"]
