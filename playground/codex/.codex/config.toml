# Codex project configuration for Pipedream API.
# Docs: https://github.com/openai/codex

# Default model. Small tasks use o4-mini, subagents may override.
model = "gpt-5-codex"
model_reasoning_effort = "medium"

# Approval policy:
#   "suggest"   — show diffs for approval (default)
#   "auto-edit" — apply file edits automatically; still ask before shell commands
#   "full-auto" — run commands without asking (only for trusted sandboxes)
approval_policy = "on-request"

# The project is built with pnpm; prefer it in generated commands.
preferred_shell = "zsh"

# ---------------------------------------------------------------------------
# Sandbox
# ---------------------------------------------------------------------------

[sandbox_workspace_write]
# Codex may write only within the project root.
writable_roots = ["./"]
# Network access needed for `pnpm install` and MCP fetches.
network_access = true
# Keep a scratch space for migrations and build artifacts.
exclude_tmpdir_env_var = false

# Environment forwarded into the sandbox.
[sandbox_workspace_write.env]
NODE_ENV = "development"
LOG_LEVEL = "info"
PIPEDREAM_MODE = "dev"

# ---------------------------------------------------------------------------
# Project instructions
# ---------------------------------------------------------------------------

[instructions]
# Appended to every prompt so small tasks never drift from project rules.
preamble = """
This is the Pipedream API. Always follow the conventions in AGENTS.md.
Prefer the smallest change that solves the problem. Reach for subagents for
review, security audits, and migration planning — don't inline those concerns.
"""

# ---------------------------------------------------------------------------
# MCP servers
# ---------------------------------------------------------------------------

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "./src"]

[mcp_servers.postgres]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-postgres"]
[mcp_servers.postgres.env]
DATABASE_URL = "${DATABASE_URL}"

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}"

# ---------------------------------------------------------------------------
# Shell allow-list (skips approval prompts)
# ---------------------------------------------------------------------------

[[shell.allow]]
pattern = "pnpm *"

[[shell.allow]]
pattern = "npx vitest *"

[[shell.allow]]
pattern = "npx drizzle-kit *"

[[shell.allow]]
pattern = "git diff*"

[[shell.allow]]
pattern = "git log*"

[[shell.allow]]
pattern = "git status"

# Block destructive operations even in full-auto mode.
[[shell.deny]]
pattern = "rm -rf *"

[[shell.deny]]
pattern = "git push --force*"

[[shell.deny]]
pattern = "pnpm publish*"

[[shell.deny]]
pattern = "drizzle-kit drop*"
