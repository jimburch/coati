# /deploy-check — Pre-flight checks before a Cloudflare Pages deploy.

description = "Run the full pre-deploy gauntlet: build, check, links, lighthouse."

[prompt]
template = """
Pre-flight deployment check for Beacon Docs.

Run the following in order. Stop on any failure and surface the cause.

## 1. Content validation

```
pnpm astro check
```

Reports schema violations, broken MDX imports, and type errors across
content and components.

## 2. Build

```
pnpm build
```

This also runs Pagefind to regenerate the search index. Build must succeed
with zero warnings related to content (Astro warns about missing frontmatter,
broken image imports, etc.).

## 3. Internal link check

```
lychee --offline dist
```

Fast (no network). Any failure blocks the deploy.

## 4. External link check (best effort)

```
lychee --exclude 'github.com' --exclude 'twitter.com' dist
```

Network-dependent. Failures are flagged but don't block deploy unless
they're on getting-started or api docs (high-traffic pages).

## 5. Lighthouse CI

```
pnpm lighthouse
```

Thresholds (from `.lighthouserc.cjs`):
- Performance: ≥ 95
- Accessibility: ≥ 100
- Best Practices: ≥ 95
- SEO: ≥ 100

Drops below those thresholds block the deploy.

## 6. Draft check

Scan `dist/` for accidentally-published drafts:

```
rg -l 'draft=\"true\"' dist
```

Any match is a bug — drafts should be filtered out at build time via
`getCollection('docs', ({ data }) => !data.draft)`.

## Output

Table summarizing each check:

| Check | Status | Notes |
| --- | --- | --- |
| astro check | ✓ | — |
| build | ✓ | 238 pages, 1.2MB JS |
| internal links | ✓ | 0 broken |
| external links | ⚠ | 2 slow responses (acme.com) |
| lighthouse | ✓ | 98 / 100 / 97 / 100 |
| drafts leaked | ✓ | — |

Verdict: `SHIP` or `HOLD`.
"""
