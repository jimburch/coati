[command]
name = "test-coverage"
description = "Run the full test suite with coverage and analyze gaps"

[command.steps]

[command.steps.1]
action = "shell"
command = "npx vitest run --coverage --reporter=json --outputFile=coverage/report.json"
description = "Run all tests with coverage reporting enabled"

[command.steps.2]
action = "shell"
command = "npx vitest run --coverage"
description = "Display human-readable coverage summary in the terminal"

[command.steps.3]
action = "read_files"
paths = ["coverage/report.json"]
description = "Read the JSON coverage report for detailed analysis"

[command.steps.4]
action = "prompt"
text = """
Analyze the coverage report and provide:

1. **Overall Coverage** — Percentage for statements, branches, functions, and lines
2. **Uncovered Files** — List any source files with less than 80% line coverage
3. **Critical Gaps** — Identify untested branches in route handlers, middleware, and service functions
4. **Recommendations** — Suggest specific test cases that would improve coverage the most, prioritized by risk

Format the output as a markdown table for the coverage summary, followed by
a prioritized list of recommended test cases to write.
"""

[command.steps.5]
action = "shell"
command = "rm -f coverage/report.json"
description = "Clean up temporary coverage report file"
