# /review — Review staged changes against Beacon's content conventions.

description = "Review the diff for content correctness, schema validity, internal-link health, and SEO basics."

[prompt]
template = """
Review the staged diff.

## Steps

1. List changed files: `git diff --cached --name-only`
2. For each file, classify:
   - `src/content/docs/**/*.mdx` → docs rules
   - `src/content/blog/**/*.mdx` → blog rules
   - `src/content/config.ts` → schema changes
   - `src/components/**/*.astro` → component rules in GEMINI.md
   - `astro.config.ts` → config review (flag any plugin changes)
3. Apply the appropriate checklist.

## Docs checklist

- [ ] Frontmatter valid per `src/content/config.ts` (title, description ≤ 160, category, order, draft)
- [ ] H1 comes from frontmatter `title`, NOT in-body
- [ ] No skipped heading levels (H2 → H4 without H3)
- [ ] All internal links relative (`./foo`, not `https://beacon.example.com/docs/foo`)
- [ ] Code blocks have languages
- [ ] `<Callout>` used for notes/warnings, not raw `> NOTE:` quotes

## Blog checklist

- [ ] Publish date matches filename prefix
- [ ] Description ≤ 160 chars and keyword-led
- [ ] Tags are kebab-case and match existing tags where applicable (`rg 'tags:' src/content/blog/` to compare)
- [ ] Hero image optimized (≤ 500KB) and has descriptive alt text
- [ ] First paragraph is a hook, not a definition

## Schema checklist

- [ ] Adding a required field? Migrate existing content or keep the field optional
- [ ] Tightening a Zod constraint? Verify no existing file violates it
- [ ] Removing a field? Search content for references before committing

## Link hygiene

Run `lychee --offline dist` to check internal links after a local build. If
`dist/` is stale, run `pnpm build` first.

## Output

Group findings by severity:
- **🚨 Must fix** — schema invalid, broken links, missing required frontmatter
- **⚠️  Should fix** — heading skips, SEO issues, missing alt text
- **💡 Consider** — naming, structure, callout usage

End with `APPROVE`, `REQUEST_CHANGES`, or `BLOCKED`.
"""
