name: CLI Release

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      # Exclude pure version-bump PRs created by this workflow so the
      # auto-merged bump commit doesn't re-trigger another release.
      - '!cli/package.json'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_WORKFLOWS }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last CLI version tag that touch cli/
          LAST_TAG=$(git tag -l 'cli-v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --oneline -- cli/)

          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|!:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE '^[a-f0-9]+ feat'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        working-directory: cli
        run: |
          PRE_BUMP=$(node -p "require('./package.json').version")
          echo "PRE_BUMP_VERSION=$PRE_BUMP" >> "$GITHUB_ENV"
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Verify version bump
        working-directory: cli
        run: |
          EXPECTED=$(node -e "
            const v = process.env.PRE_BUMP_VERSION.split('.').map(Number);
            const type = '${{ steps.bump.outputs.type }}';
            let [major, minor, patch] = v;
            if (type === 'major') { major++; minor = 0; patch = 0; }
            else if (type === 'minor') { minor++; patch = 0; }
            else { patch++; }
            console.log(major + '.' + minor + '.' + patch);
          ")
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "ERROR: cli/package.json version ($VERSION) does not match expected ($EXPECTED) from pre-bump $PRE_BUMP_VERSION + ${{ steps.bump.outputs.type }}"
            exit 1
          fi
          echo "Verified: ${PRE_BUMP_VERSION} → ${VERSION} (${{ steps.bump.outputs.type }})"

      - name: Build CLI
        working-directory: cli
        run: pnpm build

      - name: Guard against version regression
        working-directory: cli
        run: |
          LATEST_NPM=$(npm view @coati/sh version 2>/dev/null || echo "0.0.0")
          echo "npm latest: $LATEST_NPM, local: $VERSION"
          node -e "
            const [a,b] = ['$LATEST_NPM','$VERSION'].map(v=>v.split('.').map(Number));
            for(let i=0;i<3;i++){if((a[i]||0)>(b[i]||0)){console.error('ERROR: local version $VERSION is older than npm latest $LATEST_NPM');process.exit(1)}if((a[i]||0)<(b[i]||0))break}
          "

      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release and open version-bump PR
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/cli-bump-${VERSION}"

          # Stage and commit the version bump on a new branch so we can PR it
          # in. Tag the bump commit so `git checkout cli-v${VERSION}` shows the
          # correct cli/package.json. Pushing the tag does not require a PR.
          git checkout -b "$BRANCH"
          git add cli/package.json
          git commit -m "chore(cli): bump version to ${VERSION} [skip ci]"
          git tag "cli-v${VERSION}"
          git push origin "$BRANCH"
          git push origin "cli-v${VERSION}"

          # Open the PR. Use --merge (not squash) so the tagged commit is
          # preserved on main's history.
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(cli): bump version to ${VERSION}" \
            --body "Auto-generated by the CLI Release workflow.

          \`@coati/sh@${VERSION}\` has been published to npm and tag \`cli-v${VERSION}\` has been pushed. This PR syncs \`cli/package.json\` on \`main\` so the next release computes the correct base version.

          Merge with the **Create a merge commit** strategy to keep the tagged commit on main's history."

          # Try to enable auto-merge. Requires the repo setting
          # 'Allow auto-merge' to be enabled (Settings → General → Pull
          # Requests). If not enabled or branch protection blocks it, the PR
          # is left open for manual merge — npm and the tag are already in a
          # consistent state, so this is non-blocking.
          gh pr merge --auto --merge "$BRANCH" || \
            echo "::warning::Auto-merge could not be enabled. Merge PR for branch ${BRANCH} manually."
