name: Seed Dev Database

on:
  workflow_dispatch:
    inputs:
      reset:
        description: 'Reset database first (drops everything, re-runs all migrations)'
        required: false
        type: boolean
        default: true

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and seed via Docker exec
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            CONTAINER=$(docker ps --filter "name=usnp1cm6cl4b3g75l7yykla2" --format '{{.Names}}' | head -1)

            if [ -z "$CONTAINER" ]; then
              echo "ERROR: Could not find running Coati container"
              docker ps
              exit 1
            fi

            echo "Found container: $CONTAINER"

            RESET="${{ inputs.reset }}"
            if [ "$RESET" = "true" ]; then
              echo "=== Resetting database ==="
              docker exec "$CONTAINER" npx tsx scripts/reset-db.ts
            fi

            echo "=== Running migrations ==="
            docker exec "$CONTAINER" npx drizzle-kit migrate

            echo "=== Running seed script ==="
            docker exec "$CONTAINER" npx tsx scripts/seed-dev.ts

            echo "=== Done ==="
