name: Feature request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For larger features or architectural shifts, it's best to open this issue first and discuss the approach before writing code.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what use case does it unlock? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see. Include CLI commands, API shapes, or UI sketches if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this affect?
      multiple: true
      options:
        - Web
        - CLI
        - API
        - Data model
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, screenshots, or anything else that helps.
    validations:
      required: false
