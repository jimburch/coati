name: coati

services:
  postgres:
    image: postgres:17-alpine
    container_name: coati-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - coati-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:17-alpine
    container_name: coati-postgres-test
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: coati
      POSTGRES_PASSWORD: coati
      POSTGRES_DB: coati_test
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  coati-pgdata:
